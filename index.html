<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Calculadora">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<title>Calculadora</title>

<style>
html,body{
margin:0;
background:black;
font-family:-apple-system;
overflow:hidden;
}

/* contenedor */
.calc{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:430px;
padding:env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
}

/* pantalla */
#display{
color:white;
font-size:80px;
text-align:right;
padding:20px;
margin-top:60px;
overflow:hidden;
}

/* botones */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

button{
height:82px;
border-radius:50%;
border:none;
font-size:28px;
background:#2b2b2b;
color:white;
transition:0.08s;
}

button:active{
transform:scale(0.88);
filter:brightness(1.3);
}

.light{background:#a5a5a5;color:black;}
.op{background:#ff9500;}

.zero{
grid-column:span 2;
border-radius:40px;
text-align:left;
padding-left:30px;
}

/* historial panel */
#historyPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
overflow:auto;
padding:30px;
font-size:18px;
}

/* botón historial */
#historyBtn{
position:absolute;
top:20px;
right:20px;
color:white;
font-size:22px;
opacity:0.7;
}

/* modo científico */
.scientific{
display:none;
margin-bottom:10px;
}

.scientific button{
height:60px;
font-size:20px;
}

/* activar en horizontal */
@media (orientation:landscape){
.scientific{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
}
}
</style>
</head>

<body>

<div id="historyPanel" onclick="toggleHistory()"></div>

<div class="calc">

<div id="historyBtn" onclick="toggleHistory()">🕘</div>

<div id="display">0</div>

<!-- modo científico -->
<div class="scientific">
<button onclick="func('sin')">sin</button>
<button onclick="func('cos')">cos</button>
<button onclick="func('tan')">tan</button>
<button onclick="func('log')">log</button>
<button onclick="func('sqrt')">√</button>
<button onclick="func('pow')">x²</button>
</div>

<div class="grid">

<button class="light" onclick="clearAll()">AC</button>
<button class="light" onclick="toggleSign()">±</button>
<button class="light" onclick="percent()">%</button>
<button class="op" onclick="setOp('/')">÷</button>

<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>
<button class="op" onclick="setOp('*')">×</button>

<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>
<button class="op" onclick="setOp('-')">−</button>

<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>
<button class="op" onclick="setOp('+')">+</button>

<button class="zero" onclick="num(0)">0</button>
<button onclick="dot()">.</button>
<button class="op" onclick="equal()">=</button>

</div>
</div>

<script>
let display=document.getElementById("display");
let historyPanel=document.getElementById("historyPanel");

let current="0",prev=null,op=null,reset=false;
let history=[];

/* vibración */
function vibrate(){
if(navigator.vibrate) navigator.vibrate(10);
}

function update(){display.innerText=current;}

function num(n){
vibrate();
if(current==="0"||reset){current=""+n;reset=false;}
else current+=n;
update();
}

function dot(){
if(!current.includes(".")) current+=".";
update();
}

function clearAll(){
current="0";prev=null;op=null;
update();
}

function toggleSign(){
current=(parseFloat(current)*-1).toString();
update();
}

function percent(){
if(prev!==null){
let p=parseFloat(current);
current=(prev*p/100).toString();
}else{
current=(parseFloat(current)/100).toString();
}
update();
}

function setOp(o){
prev=parseFloat(current);
op=o;
reset=true;
}

/* funciones científicas */
function func(f){
let x=parseFloat(current);
let r=0;

if(f==="sin") r=Math.sin(x);
if(f==="cos") r=Math.cos(x);
if(f==="tan") r=Math.tan(x);
if(f==="log") r=Math.log10(x);
if(f==="sqrt") r=Math.sqrt(x);
if(f==="pow") r=x*x;

/* 😈 aplicar trampa */
r=trap(r);

current=r.toFixed(4).toString();
update();
}

/* 😈 trampa avanzada SIEMPRE menor */
function trap(r){
let p;

if(r>1000) p=Math.random()*0.2+0.1;
else if(r>100) p=Math.random()*0.1+0.05;
else p=Math.random()*0.05;

let fake=r*(1-p);
if(fake>=r) fake=r-1;

return fake;
}

function equal(){
if(op===null) return;

let curr=parseFloat(current);
let result=0;

if(op==="+") result=prev+curr;
if(op==="-") result=prev-curr;
if(op==="*") result=prev*curr;
if(op==="/") result=prev/curr;

let fake=trap(result);

history.push(prev+" "+op+" "+curr+" = "+fake);

current=Math.round(fake).toString();
op=null;prev=null;reset=true;

update();
}

/* historial */
function toggleHistory(){
if(historyPanel.style.display==="block"){
historyPanel.style.display="none";
}else{
historyPanel.innerHTML=history.reverse().join("<br>");
historyPanel.style.display="block";
}
}

/* swipe borrar estilo iOS */
let startX=0;
display.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});
display.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(endX<startX-50){
current=current.slice(0,-1)||"0";
update();
}
});

/* PWA */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
